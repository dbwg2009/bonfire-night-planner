name = "bonfire-night-planner"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "./dist"

# Serve index.html for any unmatched path (SPA routing)
not_found_handling = "single-page-application"

# D1 binding is configured in the Cloudflare dashboard:
# Pages project → Settings → Bindings → Add → D1 database
# Variable name: DB  →  Database: bonfire-night-db
# (No need to hardcode the database_id here)

[vars]
# Override these in Cloudflare dashboard → Pages project → Settings → Environment variables
JWT_SECRET = "change-this-to-a-secure-random-string-in-production"
MET_OFFICE_API_KEY = ""
